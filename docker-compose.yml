services:
  app:
    build:
      context: .
    container_name: tiket_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-tiket_manual}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
    volumes:
      - ./uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: tiket_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}
      MYSQL_DATABASE: ${DB_NAME:-tiket_manual}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${DB_PUBLIC_PORT:-3307}:3306"
    volumes:
      - tiket_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASS:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  tiket_db_data:
